<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica', sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 30px 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        h1 { font-family: 'Georgia', serif; font-weight: normal; font-size: 28px; margin-bottom: 30px; border-bottom: 1px solid #000; display: inline-block; padding-bottom: 5px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 8px 0; font-size: 16px; outline: none; transition: 0.3s; background: transparent; }
        input:focus, textarea:focus { border-bottom: 1px solid #000; }
        button { background: #000; color: #fff; border: none; padding: 12px 35px; font-size: 12px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conversemos</h1>
        <form action="https://formspree.io/f/mykbbdjz" method="POST">
            <div class="group">
                <label>Nombre</label>
                <input type="text" name="name" required>
            </div>
            <div class="group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="group">
                <label>Mensaje</label>
                <textarea name="message" rows="4" required></textarea>
            </div>
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
